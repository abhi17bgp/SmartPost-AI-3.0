<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon (FIXED) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- SEO Title -->
    <title> SmartPost AI | API Testing Tool Online </title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="SmartPost AI is a free online API testing tool to send HTTP requests, test REST APIs, and debug endpoints easily in your browser without Postman."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="API testing tool, REST API tester, online API tester, Postman alternative, test APIs online"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://smartpostai.online/" />

    <!-- Open Graph -->
    <meta property="og:title" content="API Testing Tool Online | SmartPost AI" />
    <meta
      property="og:description"
      content="Test APIs online easily with SmartPost AI. Send requests and debug APIs without installing tools."
    />
    <meta property="og:url" content="https://smartpostai.online/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://smartpostai.online/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="API Testing Tool Online | SmartPost AI" />
    <meta
      name="twitter:description"
      content="Free online API testing tool to send requests and debug APIs easily."
    />
    <meta name="twitter:image" content="https://smartpostai.online/logo.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Razorpay Checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>

  <body class="bg-gray-900 text-white min-h-screen font-sans antialiased">
    <div id="root"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
